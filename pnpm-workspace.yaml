packages:
  - "packages/*"
allowBuilds:
  '@swc/core': true
  cbor-extract: true
  esbuild: true
  protobufjs: true
  sharp: true
minimumReleaseAgeExclude:
  # Recent radiantjs releases the pnpm supply-chain policy briefly flags as
  # "too new" (within minimumReleaseAge). Kept here for stable installs
  # until the policy window naturally clears each one. Older versions are
  # pruned once they're well past the window — no point listing exclusions
  # the policy already accepts on its own.
  - '@radiant-core/radiantjs@2.0.5'
overrides:
  protobufjs: ^7.5.5
