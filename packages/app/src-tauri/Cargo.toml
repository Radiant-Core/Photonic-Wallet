[package]
name = "app"
version = "3.0.1"
description = "Photonic Wallet"
authors = ["The Photonic Developers"]
license = "MIT"
repository = ""
default-run = "app"
edition = "2021"
rust-version = "1.60"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
# Tauri 1.x — track the 1.8 line. Bumped from 1.5.0 to pick up several
# upstream security advisories landed between 1.5 and 1.8 (filesystem
# scope, IPC handling). Cargo resolves "1.8" as ^1.8 (1.8.x); the latest
# 1.x is acceptable. If migrating to 2.x in the future, revisit.
tauri-build = { version = "1.8", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.8", features = [] }

[features]
# this feature is used for production builds or when `devPath` points to the filesystem and the built-in dev server is disabled.
# If you use cargo directly instead of tauri's cli you can use this feature flag to switch between tauri's `dev` and `build` modes.
# DO NOT REMOVE!!
custom-protocol = [ "tauri/custom-protocol" ]
