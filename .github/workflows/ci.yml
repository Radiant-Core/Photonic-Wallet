name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install pnpm BEFORE setup-node so the latter can pick up the
      # pnpm cache path automatically. Version pin matches the workspace's
      # `packageManager` field in the root package.json (R19 / R30 — pin
      # supply-chain entry points).
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # R30: failures here must fail the job. The previous workflow ran
      # lint and tsc with `continue-on-error: true`, which let
      # regressions slip into main unnoticed.
      - name: Type-check (workspace-wide)
        run: pnpm check-types

      - name: Lint (workspace-wide)
        run: pnpm lint

      - name: Test (workspace-wide)
        run: pnpm test

      - name: CSP parity (app only)
        run: pnpm csp:check
